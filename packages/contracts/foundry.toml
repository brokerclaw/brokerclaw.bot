[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
ffi = false
fuzz = { runs = 256, max_test_rejects = 65536 }

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[profile.default.fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "attributes_first"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }

[rpc_endpoints]
base = "${BASE_RPC_URL}"
